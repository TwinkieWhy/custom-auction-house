<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Auction House</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;500;600;700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:          #08060400;
      --bg-base:     #09070500;
      --bg-card:     #110e0900;
      --bg-panel:    #0c0a0700;
      --bg-input:    #17130d00;
      --gold:        #c9a227;
      --gold-dim:    #7a6218;
      --gold-bright: #f0d060;
      --text:        #ddc9a0;
      --text-dim:    #7a6e58;
      --text-bright: #f5e8c8;
      --border:      #261e12;
      --border-hi:   #3e3020;

      --common:    #9d9d9d;
      --uncommon:  #1eff00;
      --rare:      #0070dd;
      --epic:      #a335ee;
      --legendary: #ff8000;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background-color: #09070500;
      background-color: #090705;
      color: var(--text);
      font-family: 'EB Garamond', serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Ambient background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 15% 0%,  rgba(140,80,0,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 85% 100%, rgba(80,40,0,0.08) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* Subtle crosshatch texture */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23c9a227' fill-opacity='0.025'%3E%3Cpath d='M0 40L40 0H20L0 20M40 40V20L20 40'/%3E%3C/g%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* ─── Header ─── */
    header {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem 2rem 1.6rem;
      background: linear-gradient(180deg, rgba(160,100,0,0.10) 0%, transparent 100%);
      border-bottom: 1px solid var(--border);
    }

    .ornament {
      font-size: 0.55rem;
      letter-spacing: 0.55em;
      color: var(--gold-dim);
      opacity: 0.6;
      margin-bottom: 0.5rem;
      display: block;
    }

    h1 {
      font-family: 'Cinzel Decorative', serif;
      font-weight: 700;
      font-size: clamp(1.6rem, 4.5vw, 3.2rem);
      color: var(--gold-bright);
      text-shadow: 0 0 50px rgba(201,162,39,0.35), 0 2px 6px rgba(0,0,0,0.9);
      letter-spacing: 0.04em;
      line-height: 1.1;
    }

    .subtitle {
      font-family: 'Cinzel', serif;
      font-size: 0.7rem;
      letter-spacing: 0.55em;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-top: 0.4rem;
    }

    /* ─── Layout ─── */
    .layout {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 250px 1fr;
      min-height: calc(100vh - 130px);
    }

    /* ─── Sidebar ─── */
    aside {
      background: var(--bg-panel);
      border-right: 1px solid var(--border);
      padding: 1.25rem;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border-hi) transparent;
    }

    aside::-webkit-scrollbar { width: 4px; }
    aside::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 2px; }

    .filter-block { margin-bottom: 1.4rem; }

    .filter-label {
      font-family: 'Cinzel', serif;
      font-size: 0.62rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--gold);
      padding-bottom: 0.4rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 0.7rem;
      display: block;
    }

    /* Search */
    input[type="text"], input[type="number"] {
      background: var(--bg-input);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'EB Garamond', serif;
      font-size: 0.95rem;
      padding: 0.45rem 0.65rem;
      outline: none;
      border-radius: 2px;
      width: 100%;
      transition: border-color 0.18s;
    }

    input:focus { border-color: var(--gold-dim); }
    input::placeholder { color: var(--text-dim); font-style: italic; }

    /* Rarity toggle rows */
    .rarity-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.28rem 0;
      cursor: pointer;
      font-size: 0.88rem;
      user-select: none;
    }

    .rarity-row input[type="checkbox"] { display: none; }

    .check-box {
      width: 14px; height: 14px;
      border: 1px solid var(--border-hi);
      background: var(--bg-input);
      border-radius: 2px;
      flex-shrink: 0;
      display: grid;
      place-items: center;
      transition: background 0.15s, border-color 0.15s;
    }

    .rarity-row input:checked ~ .check-box {
      background: var(--gold);
      border-color: var(--gold);
    }

    .check-box::after {
      content: '';
      width: 6px; height: 6px;
      display: none;
    }

    .rarity-row input:checked ~ .check-box::after {
      display: block;
      border-right: 2px solid #000;
      border-bottom: 2px solid #000;
      transform: rotate(45deg) translateY(-1px);
    }

    .rarity-gem {
      width: 9px; height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* Tag pills */
    .tag-cloud { display: flex; flex-wrap: wrap; gap: 0.3rem; }

    .tag-pill {
      font-family: 'Cinzel', serif;
      font-size: 0.6rem;
      letter-spacing: 0.06em;
      padding: 0.18rem 0.5rem;
      border: 1px solid var(--border-hi);
      border-radius: 2px;
      color: var(--text-dim);
      background: var(--bg-input);
      cursor: pointer;
      user-select: none;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }

    .tag-pill:hover { color: var(--text); border-color: var(--gold-dim); }
    .tag-pill.on { color: var(--gold); border-color: var(--gold); background: rgba(201,162,39,0.10); }

    /* Price inputs */
    .price-pair { display: grid; grid-template-columns: 1fr 1fr; gap: 0.4rem; }

    /* Clear button */
    button.clear-all {
      width: 100%;
      font-family: 'Cinzel', serif;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-dim);
      background: none;
      border: 1px solid var(--border);
      padding: 0.38rem;
      cursor: pointer;
      border-radius: 2px;
      transition: color 0.15s, border-color 0.15s;
    }

    button.clear-all:hover { color: var(--gold); border-color: var(--gold-dim); }

    /* ─── Main area ─── */
    main { padding: 1.25rem 1.5rem; }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
      padding-bottom: 0.9rem;
      border-bottom: 1px solid var(--border);
      gap: 1rem;
      flex-wrap: wrap;
    }

    .count {
      font-size: 0.82rem;
      color: var(--text-dim);
      font-style: italic;
    }

    select {
      background: var(--bg-input);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Cinzel', serif;
      font-size: 0.68rem;
      letter-spacing: 0.06em;
      padding: 0.38rem 0.7rem;
      border-radius: 2px;
      cursor: pointer;
      outline: none;
    }

    /* ─── Item grid ─── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 1rem;
    }

    /* ─── Item card ─── */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 2px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
      animation: rise 0.3s both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card:hover { transform: translateY(-3px); }

    .card.legendary { border-color: rgba(255,128,0,0.35); }
    .card.legendary:hover { border-color: var(--legendary); box-shadow: 0 8px 28px rgba(255,128,0,0.18); }
    .card.epic       { border-color: rgba(163,53,238,0.30); }
    .card.epic:hover  { border-color: var(--epic);      box-shadow: 0 8px 28px rgba(163,53,238,0.15); }
    .card.rare       { border-color: rgba(0,112,221,0.25); }
    .card.rare:hover  { border-color: var(--rare);      box-shadow: 0 8px 28px rgba(0,112,221,0.15); }
    .card.uncommon:hover { border-color: var(--uncommon); box-shadow: 0 8px 28px rgba(30,255,0,0.08); }
    .card.common:hover   { box-shadow: 0 6px 18px rgba(0,0,0,0.4); }

    /* Image wrapper */
    .thumb {
      position: relative;
      padding-top: 68%;
      background: #080604;
      overflow: hidden;
    }

    .thumb img {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform 0.35s;
    }

    .card:hover .thumb img { transform: scale(1.05); }

    .rarity-badge {
      position: absolute;
      top: 7px; right: 7px;
      font-family: 'Cinzel', serif;
      font-size: 0.55rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.18rem 0.45rem;
      border-radius: 2px;
      backdrop-filter: blur(6px);
      border: 1px solid;
    }

    .rarity-badge.common    { color: var(--common);    border-color: var(--common);    background: rgba(0,0,0,0.55); }
    .rarity-badge.uncommon  { color: var(--uncommon);  border-color: var(--uncommon);  background: rgba(0,0,0,0.55); }
    .rarity-badge.rare      { color: var(--rare);      border-color: var(--rare);      background: rgba(0,0,0,0.55); }
    .rarity-badge.epic      { color: var(--epic);      border-color: var(--epic);      background: rgba(0,0,0,0.55); }
    .rarity-badge.legendary { color: var(--legendary); border-color: var(--legendary); background: rgba(0,0,0,0.55); }

    /* Card body */
    .card-body { padding: 0.75rem; }

    .card-name {
      font-family: 'Cinzel', serif;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-bright);
      line-height: 1.2;
      margin-bottom: 0.2rem;
    }

    .card-seller {
      font-size: 0.72rem;
      color: var(--text-dim);
      font-style: italic;
      margin-bottom: 0.5rem;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.22rem;
      margin-bottom: 0.55rem;
    }

    .ctag {
      font-family: 'Cinzel', serif;
      font-size: 0.55rem;
      letter-spacing: 0.05em;
      padding: 0.1rem 0.35rem;
      border: 1px solid var(--border-hi);
      border-radius: 2px;
      color: var(--text-dim);
      background: rgba(255,255,255,0.03);
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 0.5rem;
      border-top: 1px solid var(--border);
    }

    .price {
      font-family: 'Cinzel', serif;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--gold);
    }

    .price .curr {
      font-size: 0.65rem;
      color: var(--gold-dim);
      margin-left: 0.15rem;
    }

    /* ─── Empty state ─── */
    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 5rem 2rem;
      color: var(--text-dim);
    }

    .empty-icon { font-size: 2.5rem; opacity: 0.25; margin-bottom: 0.8rem; }

    .empty-msg {
      font-family: 'Cinzel', serif;
      font-size: 0.8rem;
      letter-spacing: 0.15em;
    }

    /* ─── Modal ─── */
    .backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      backdrop-filter: blur(5px);
      z-index: 200;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .backdrop.open { display: flex; }

    .modal {
      background: var(--bg-card);
      border: 1px solid var(--border-hi);
      max-width: 580px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
      border-radius: 2px;
      animation: popIn 0.22s cubic-bezier(0.34,1.4,0.64,1) both;
      scrollbar-width: thin;
      scrollbar-color: var(--border-hi) transparent;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.92); }
      to   { opacity: 1; transform: scale(1); }
    }

    .modal-hero {
      width: 100%;
      height: 240px;
      object-fit: cover;
      display: block;
    }

    .modal-body { padding: 1.4rem; }

    .modal-rarity {
      font-family: 'Cinzel', serif;
      font-size: 0.62rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-bottom: 0.3rem;
    }

    .modal-name {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(1.1rem, 3vw, 1.5rem);
      color: var(--text-bright);
      line-height: 1.15;
      margin-bottom: 0.2rem;
    }

    .modal-seller {
      font-size: 0.82rem;
      color: var(--text-dim);
      font-style: italic;
      margin-bottom: 1.1rem;
    }

    .modal-desc {
      font-size: 0.98rem;
      line-height: 1.75;
      color: var(--text);
      font-style: italic;
      border-left: 2px solid var(--gold-dim);
      padding-left: 1rem;
      margin-bottom: 1rem;
    }

    .modal-stats {
      background: rgba(201,162,39,0.05);
      border: 1px solid var(--border-hi);
      padding: 0.7rem 1rem;
      margin-bottom: 1rem;
      border-radius: 2px;
    }

    .stats-label {
      font-family: 'Cinzel', serif;
      font-size: 0.58rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.35rem;
    }

    .stats-text {
      font-size: 0.9rem;
      line-height: 1.6;
      color: var(--text);
    }

    .modal-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
      margin-bottom: 1.1rem;
    }

    .modal-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }

    .modal-price {
      font-family: 'Cinzel Decorative', serif;
      font-size: 1.5rem;
      color: var(--gold);
    }

    .modal-price .curr {
      font-size: 0.65rem;
      color: var(--gold-dim);
      margin-left: 0.2rem;
    }

    .close-btn {
      position: absolute;
      top: 0.6rem; right: 0.6rem;
      background: rgba(0,0,0,0.65);
      border: 1px solid var(--border-hi);
      color: var(--text-dim);
      width: 28px; height: 28px;
      display: grid;
      place-items: center;
      cursor: pointer;
      font-size: 0.85rem;
      border-radius: 2px;
      z-index: 10;
      transition: color 0.15s, border-color 0.15s;
    }

    .close-btn:hover { color: var(--text-bright); border-color: var(--gold-dim); }

    /* ─── Responsive ─── */
    @media (max-width: 720px) {
      .layout { grid-template-columns: 1fr; }
      aside { position: static; height: auto; border-right: none; border-bottom: 1px solid var(--border); }
    }
  </style>
</head>
<body>

<header>
  <span class="ornament">⬥ &nbsp; ⬥ &nbsp; ⬥ &nbsp; ⬥ &nbsp; ⬥ &nbsp; ⬥ &nbsp; ⬥ &nbsp; ⬥ &nbsp; ⬥</span>
  <h1>⚔ &nbsp;The Auction House&nbsp; ⚔</h1>
  <div class="subtitle">Browse &nbsp;·&nbsp; Inspect &nbsp;·&nbsp; Acquire</div>
</header>

<div class="layout">

  <!-- ── Sidebar ── -->
  <aside>

    <div class="filter-block">
      <span class="filter-label">Search</span>
      <input type="text" id="q" placeholder="Search by name or description…">
    </div>

    <div class="filter-block">
      <span class="filter-label">Rarity</span>
      <div id="rarityPanel"></div>
    </div>

    <div class="filter-block">
      <span class="filter-label">Tags</span>
      <div class="tag-cloud" id="tagPanel"></div>
    </div>

    <div class="filter-block">
      <span class="filter-label">Price Range</span>
      <div class="price-pair">
        <input type="number" id="pmin" placeholder="Min" min="0">
        <input type="number" id="pmax" placeholder="Max" min="0">
      </div>
    </div>

    <button class="clear-all" id="clearBtn">✕ &nbsp; Clear All Filters</button>

  </aside>

  <!-- ── Main ── -->
  <main>
    <div class="toolbar">
      <span class="count" id="countEl">Loading wares…</span>
      <select id="sortSel">
        <option value="">Sort: Default</option>
        <option value="price-asc">Price: Low → High</option>
        <option value="price-desc">Price: High → Low</option>
        <option value="name">Name A–Z</option>
        <option value="rarity">Rarity: Best First</option>
      </select>
    </div>

    <div class="grid" id="grid"></div>
  </main>

</div>

<!-- ── Modal ── -->
<div class="backdrop" id="backdrop">
  <div class="modal" id="modal">
    <button class="close-btn" id="closeBtn">✕</button>
  </div>
</div>

<script>
  const RARITIES = ['legendary','epic','rare','uncommon','common'];
  const RARITY_RANK = {legendary:0, epic:1, rare:2, uncommon:3, common:4};

  let items = [];
  let activeTags = new Set();
  let activeRarities = new Set(RARITIES);

  /* ── Bootstrap ── */
  fetch('items.json')
    .then(r => { if (!r.ok) throw new Error(r.statusText); return r.json(); })
    .then(data => { items = data; buildSidebar(); render(); })
    .catch(() => {
      document.getElementById('countEl').textContent = '⚠ Could not load items.json';
    });

  /* ── Sidebar construction ── */
  function buildSidebar() {
    /* Rarity checkboxes */
    const rp = document.getElementById('rarityPanel');
    RARITIES.forEach(r => {
      const lbl = document.createElement('label');
      lbl.className = 'rarity-row';
      lbl.innerHTML = `
        <input type="checkbox" checked data-r="${r}">
        <span class="check-box"></span>
        <span class="rarity-gem" style="background:var(--${r})"></span>
        <span style="color:var(--${r})">${cap(r)}</span>`;
      lbl.querySelector('input').addEventListener('change', e => {
        e.target.checked ? activeRarities.add(r) : activeRarities.delete(r);
        render();
      });
      rp.appendChild(lbl);
    });

    /* Tag pills */
    const allTags = [...new Set(items.flatMap(i => i.tags || []))].sort();
    const tp = document.getElementById('tagPanel');
    allTags.forEach(t => {
      const el = document.createElement('span');
      el.className = 'tag-pill';
      el.textContent = t;
      el.addEventListener('click', () => {
        el.classList.toggle('on');
        activeTags.has(t) ? activeTags.delete(t) : activeTags.add(t);
        render();
      });
      tp.appendChild(el);
    });

    /* Live listeners */
    ['q','pmin','pmax'].forEach(id => document.getElementById(id).addEventListener('input', render));
    document.getElementById('sortSel').addEventListener('change', render);
    document.getElementById('clearBtn').addEventListener('click', clearAll);
    document.getElementById('closeBtn').addEventListener('click', closeModal);
    document.getElementById('backdrop').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
  }

  /* ── Filtering & sorting ── */
  function filtered() {
    const q    = document.getElementById('q').value.trim().toLowerCase();
    const pmin = parseFloat(document.getElementById('pmin').value) || 0;
    const pmax = parseFloat(document.getElementById('pmax').value) || Infinity;
    const sort = document.getElementById('sortSel').value;

    let list = items.filter(it => {
      if (!activeRarities.has(it.rarity)) return false;
      if (activeTags.size && ![...activeTags].every(t => (it.tags||[]).includes(t))) return false;
      if (it.price < pmin || it.price > pmax) return false;
      if (q && !it.name.toLowerCase().includes(q) && !(it.description||'').toLowerCase().includes(q)) return false;
      return true;
    });

    if (sort === 'price-asc')  list.sort((a,b) => a.price - b.price);
    if (sort === 'price-desc') list.sort((a,b) => b.price - a.price);
    if (sort === 'name')       list.sort((a,b) => a.name.localeCompare(b.name));
    if (sort === 'rarity')     list.sort((a,b) => (RARITY_RANK[a.rarity]??9) - (RARITY_RANK[b.rarity]??9));

    return list;
  }

  /* ── Render grid ── */
  function render() {
    const list = filtered();
    const grid = document.getElementById('grid');
    const count = document.getElementById('countEl');
    count.textContent = `${list.length} item${list.length !== 1 ? 's' : ''} available`;
    grid.innerHTML = '';

    if (!list.length) {
      grid.innerHTML = `<div class="empty"><div class="empty-icon">⚗</div><div class="empty-msg">No items match your search</div></div>`;
      return;
    }

    list.forEach((it, i) => {
      const card = document.createElement('div');
      card.className = `card ${it.rarity}`;
      card.style.animationDelay = `${Math.min(i * 0.035, 0.4)}s`;
      const tagsHtml = (it.tags||[]).slice(0,4).map(t => `<span class="ctag">${t}</span>`).join('');
      card.innerHTML = `
        <div class="thumb">
          <img src="${it.image}" alt="${esc(it.name)}" loading="lazy"
               onerror="this.src='https://placehold.co/400x280/110e09/261e12?text=No+Image'">
          <span class="rarity-badge ${it.rarity}">${it.rarity}</span>
        </div>
        <div class="card-body">
          <div class="card-name">${esc(it.name)}</div>
          <div class="card-seller">Sold by ${esc(it.seller||'Unknown')}</div>
          <div class="card-tags">${tagsHtml}</div>
          <div class="card-footer">
            <div class="price">${it.price.toLocaleString()}<span class="curr">${esc(it.currency||'gp')}</span></div>
          </div>
        </div>`;
      card.addEventListener('click', () => openModal(it));
      grid.appendChild(card);
    });
  }

  /* ── Modal ── */
  function openModal(it) {
    const modal = document.getElementById('modal');
    const tagsHtml = (it.tags||[]).map(t => `<span class="ctag" style="font-size:0.65rem;padding:0.15rem 0.4rem">${t}</span>`).join('');
    const statsHtml = it.stats ? `
      <div class="modal-stats">
        <div class="stats-label">Item Properties</div>
        <div class="stats-text">${esc(it.stats)}</div>
      </div>` : '';

    modal.innerHTML = `
      <button class="close-btn" id="closeBtn">✕</button>
      <img class="modal-hero" src="${it.image}" alt="${esc(it.name)}"
           onerror="this.src='https://placehold.co/600x240/110e09/261e12?text=No+Image'">
      <div class="modal-body">
        <div class="modal-rarity" style="color:var(--${it.rarity})">${it.rarity}</div>
        <div class="modal-name">${esc(it.name)}</div>
        <div class="modal-seller">Offered by ${esc(it.seller||'Unknown Merchant')}</div>
        <div class="modal-desc">${esc(it.description||'No description available.')}</div>
        ${statsHtml}
        <div class="modal-tags">${tagsHtml}</div>
        <div class="modal-footer">
          <div class="modal-price">${it.price.toLocaleString()}<span class="curr">${esc(it.currency||'gp')}</span></div>
        </div>
      </div>`;

    document.getElementById('closeBtn').addEventListener('click', closeModal);
    document.getElementById('backdrop').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    document.getElementById('backdrop').classList.remove('open');
    document.body.style.overflow = '';
  }

  /* ── Helpers ── */
  function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1); }
  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function clearAll() {
    document.getElementById('q').value = '';
    document.getElementById('pmin').value = '';
    document.getElementById('pmax').value = '';
    document.getElementById('sortSel').value = '';
    activeTags.clear();
    activeRarities = new Set(RARITIES);
    document.querySelectorAll('[data-r]').forEach(el => el.checked = true);
    document.querySelectorAll('.tag-pill').forEach(el => el.classList.remove('on'));
    render();
  }
</script>
</body>
</html>
