<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallant's Auction House</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;500;600;700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-base:     #090705;
      --bg-card:     #110e09;
      --bg-panel:    #0c0a07;
      --bg-input:    #17130d;
      --gold:        #c9a227;
      --gold-dim:    #7a6218;
      --gold-bright: #f0d060;
      --text:        #ddc9a0;
      --text-dim:    #7a6e58;
      --text-bright: #f5e8c8;
      --border:      #261e12;
      --border-hi:   #3e3020;

      /* Rarity colours */
      --vip: #44D62C;
      --vvip: #00bfff;
      --vvvip: #bf00ff;
      --vvvvip: #ff2299;
      --god: #ffd700;

      /* Class colours */
      --cls-warrior: #e03030;
      --cls-mage:    #3080e0;
      --cls-thief:   #9030c0;
      --cls-archer:  #30a040;
      --cls-pirate:  #808080;
      --cls-watk:    #e07820;
      --cls-matk:    #20c8c0;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background-color: var(--bg-base);
      color: var(--text);
      font-family: 'EB Garamond', serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 15% 0%,  rgba(140,80,0,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 85% 100%, rgba(80,40,0,0.08) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23c9a227' fill-opacity='0.025'%3E%3Cpath d='M0 40L40 0H20L0 20M40 40V20L20 40'/%3E%3C/g%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* ─── Header ─── */
    header {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem 2rem 1.6rem;
      background: linear-gradient(180deg, rgba(160,100,0,0.10) 0%, transparent 100%);
      border-bottom: 1px solid var(--border);
    }

    .ornament {
      font-size: 0.55rem;
      letter-spacing: 0.55em;
      color: var(--gold-dim);
      opacity: 0.6;
      margin-bottom: 0.5rem;
      display: block;
    }

    h1 {
      font-family: 'Cinzel Decorative', serif;
      font-weight: 700;
      font-size: clamp(1.6rem, 4.5vw, 3.2rem);
      color: var(--gold-bright);
      text-shadow: 0 0 50px rgba(201,162,39,0.35), 0 2px 6px rgba(0,0,0,0.9);
      letter-spacing: 0.04em;
      line-height: 1.1;
    }

    .subtitle {
      font-family: 'Cinzel', serif;
      font-size: 0.9rem;
      letter-spacing: 0.55em;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-top: 0.4rem;
    }

    /* ─── Layout ─── */
    .layout {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 250px 1fr;
      min-height: calc(100vh - 130px);
    }

    /* ─── Sidebar ─── */
    aside {
      background: var(--bg-panel);
      border-right: 1px solid var(--border);
      padding: 1.25rem;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border-hi) transparent;
    }

    aside::-webkit-scrollbar { width: 4px; }
    aside::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 2px; }

    .filter-block { margin-bottom: 1.4rem; }

    .filter-label {
      font-family: 'Cinzel', serif;
      font-size: 0.78rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--gold);
      padding-bottom: 0.4rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 0.7rem;
      display: block;
    }

    input[type="text"] {
      background: var(--bg-input);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'EB Garamond', serif;
      font-size: 1.1rem;
      padding: 0.45rem 0.65rem;
      outline: none;
      border-radius: 2px;
      width: 100%;
      transition: border-color 0.18s;
    }

    input:focus { border-color: var(--gold-dim); }
    input::placeholder { color: var(--text-dim); font-style: italic; }

    /* Rarity filter pills */
    .filter-pill.rar-vip.on    { color: var(--vip);    border-color: var(--vip);    background: rgba(68,214,44,0.10); }
    .filter-pill.rar-vvip.on   { color: var(--vvip);   border-color: var(--vvip);   background: rgba(0,191,255,0.10); }
    .filter-pill.rar-vvvip.on  { color: var(--vvvip);  border-color: var(--vvvip);  background: rgba(191,0,255,0.10); }
    .filter-pill.rar-vvvvip.on { color: var(--vvvvip); border-color: var(--vvvvip); background: rgba(255,34,153,0.10); }
    .filter-pill.rar-god.on    { color: var(--god);    border-color: var(--god);    background: rgba(255,215,0,0.10); }

    /* Filter pills (class, itemtype) */
    .pill-cloud { display: flex; flex-wrap: wrap; gap: 0.3rem; }

    .filter-pill {
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.06em;
      padding: 0.20rem 0.5rem;
      border: 1px solid var(--border-hi);
      border-radius: 2px;
      color: var(--text-dim);
      background: var(--bg-input);
      cursor: pointer;
      user-select: none;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }

    .filter-pill:hover { color: var(--text); border-color: var(--gold-dim); }
    .filter-pill.on { color: var(--gold); border-color: var(--gold); background: rgba(201,162,39,0.10); }

    /* Coloured class pills */
    .filter-pill.cls-warrior.on { color: var(--cls-warrior); border-color: var(--cls-warrior); background: rgba(224,48,48,0.10); }
    .filter-pill.cls-mage.on    { color: var(--cls-mage);    border-color: var(--cls-mage);    background: rgba(48,128,224,0.10); }
    .filter-pill.cls-thief.on   { color: var(--cls-thief);   border-color: var(--cls-thief);   background: rgba(144,48,192,0.10); }
    .filter-pill.cls-archer.on  { color: var(--cls-archer);  border-color: var(--cls-archer);  background: rgba(48,160,64,0.10); }
    .filter-pill.cls-pirate.on  { color: var(--cls-pirate);  border-color: var(--cls-pirate);  background: rgba(128,128,128,0.10); }
    .filter-pill.cls-watk.on    { color: var(--cls-watk);    border-color: var(--cls-watk);    background: rgba(224,120,32,0.10); }
    .filter-pill.cls-matk.on    { color: var(--cls-matk);    border-color: var(--cls-matk);    background: rgba(32,200,192,0.10); }

    /* Clear button */
    button.clear-all {
      width: 100%;
      font-family: 'Cinzel', serif;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-dim);
      background: none;
      border: 1px solid var(--border);
      padding: 0.38rem;
      cursor: pointer;
      border-radius: 2px;
      transition: color 0.15s, border-color 0.15s;
    }

    button.clear-all:hover { color: var(--gold); border-color: var(--gold-dim); }

    /* ─── Main area ─── */
    main { padding: 1.25rem 1.5rem; }

    .toolbar {
      display: flex;
      align-items: center;
      margin-bottom: 1rem;
      padding-bottom: 0.9rem;
      border-bottom: 1px solid var(--border);
    }

    .count {
      font-size: 0.82rem;
      color: var(--text-dim);
      font-style: italic;
    }

    /* ─── Item grid ─── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1rem;
    }

    /* ─── Item card ─── */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 2px;
      overflow: hidden;
      cursor: pointer;
      transition: box-shadow 0.2s, border-color 0.2s;
      animation: rise 0.3s both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card.vip:hover    { border-color: var(--vip);    box-shadow: 0 8px 28px rgba(68,214,44,0.18); }
    .card.vvip:hover   { border-color: var(--vvip);   box-shadow: 0 8px 28px rgba(0,191,255,0.18); }
    .card.vvvip:hover  { border-color: var(--vvvip);  box-shadow: 0 8px 28px rgba(191,0,255,0.18); }
    .card.vvvvip:hover { border-color: var(--vvvvip); box-shadow: 0 8px 28px rgba(255,34,153,0.18); }
    .card.god:hover    { border-color: var(--god);    box-shadow: 0 8px 34px rgba(255,215,0,0.30); }

    /* Resting rarity border tint */
    .card.vip    { border-color: rgba(68,214,44,0.22); }
    .card.vvip   { border-color: rgba(0,191,255,0.22); }
    .card.vvvip  { border-color: rgba(191,0,255,0.25); }
    .card.vvvvip { border-color: rgba(255,34,153,0.25); }
    .card.god    { border-color: rgba(255,215,0,0.35); }

    /* Image wrapper — 2:3 portrait ratio */
    .thumb {
      position: relative;
      padding-top: 150%;
      background: #080604;
      overflow: hidden;
    }

    .thumb img {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center top;
    }

    /* Rarity badge — solid dark background for readability */
    .rarity-badge {
      position: absolute;
      top: 7px; right: 7px;
      font-family: 'Cinzel', serif;
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.18rem 0.45rem;
      border-radius: 2px;
      border: 1px solid;
      background: rgba(5,3,2,0.82);
    }

    .rarity-badge.vip    { color: var(--vip);    border-color: rgba(68,214,44,0.6); }
    .rarity-badge.vvip   { color: var(--vvip);   border-color: rgba(0,191,255,0.6); }
    .rarity-badge.vvvip  { color: var(--vvvip);  border-color: rgba(191,0,255,0.6); }
    .rarity-badge.vvvvip { color: var(--vvvvip); border-color: rgba(255,34,153,0.6); }
    .rarity-badge.god    { color: var(--god);    border-color: rgba(255,215,0,0.6); }

    /* Card body */
    .card-body { padding: 0.65rem 0.75rem 0.75rem; }

    .card-name {
      font-family: 'Cinzel', serif;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-bright);
      line-height: 1.2;
      margin-bottom: 0.45rem;
      min-height: 2.4rem;
      letter-spacing: -0.015rem;
    }

    /* Badges row — class + subtype */
    .card-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 0.22rem;
      margin-bottom: 0.5rem;
    }

    .badge {
      font-family: 'Cinzel', serif;
      font-size: 0.68rem;
      letter-spacing: 0.06em;
      padding: 0.12rem 0.38rem;
      border: 1px solid;
      border-radius: 2px;
    }

    /* Class badge colours */
    .badge-class.warrior { color: var(--cls-warrior); border-color: rgba(224,48,48,0.45);   background: rgba(224,48,48,0.08); }
    .badge-class.mage    { color: var(--cls-mage);    border-color: rgba(48,128,224,0.45);  background: rgba(48,128,224,0.08); }
    .badge-class.thief   { color: var(--cls-thief);   border-color: rgba(144,48,192,0.45);  background: rgba(144,48,192,0.08); }
    .badge-class.archer  { color: var(--cls-archer);  border-color: rgba(48,160,64,0.45);   background: rgba(48,160,64,0.08); }
    .badge-class.pirate  { color: var(--cls-pirate);  border-color: rgba(128,128,128,0.45); background: rgba(128,128,128,0.08); }
    .badge-class.watk    { color: var(--cls-watk);    border-color: rgba(224,120,32,0.45);  background: rgba(224,120,32,0.08); }
    .badge-class.matk    { color: var(--cls-matk);    border-color: rgba(32,200,192,0.45);  background: rgba(32,200,192,0.08); }

    /* Subtype badge */
    .badge-subtype {
      color: var(--text-dim);
      border-color: var(--border-hi);
      background: rgba(255,255,255,0.03);
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 0.45rem;
      border-top: 1px solid var(--border);
    }

    .price {
      font-family: 'Cinzel', serif;
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--gold);
      margin: auto;
      padding-top: 0.5rem;
    }

    /* ─── Empty state ─── */
    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 5rem 2rem;
      color: var(--text-dim);
    }

    .empty-icon { font-size: 2.5rem; opacity: 0.25; margin-bottom: 0.8rem; }

    .empty-msg {
      font-family: 'Cinzel', serif;
      font-size: 0.8rem;
      letter-spacing: 0.15em;
    }

    /* ─── Modal ─── */
    .backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      backdrop-filter: blur(5px);
      z-index: 200;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .backdrop.open { display: flex; }

    .modal {
      background: var(--bg-card);
      border: 1px solid var(--border-hi);
      max-width: 480px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
      border-radius: 2px;
      animation: popIn 0.22s cubic-bezier(0.34,1.4,0.64,1) both;
      scrollbar-width: thin;
      scrollbar-color: var(--border-hi) transparent;
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.92); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* Modal: left column = portrait image, right = details */
    .modal-img-col {
      position: relative;
      background: #060402;
    }

    .modal-img-col img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
      min-height: 320px;
    }

    .modal-info-col {
      padding: 1.2rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      overflow-y: auto;
    }

    .modal-rarity {
      font-family: 'Cinzel', serif;
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
    }

    .modal-name {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(0.9rem, 2.5vw, 1.2rem);
      color: var(--text-bright);
      line-height: 1.15;
    }

    .modal-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 0.25rem;
    }

    .modal-desc {
      font-size: 0.9rem;
      line-height: 1.7;
      color: var(--text);
      font-style: italic;
      border-left: 2px solid var(--gold-dim);
      padding-left: 0.75rem;
      flex: 1;
    }

    .modal-footer {
      padding-top: 0.75rem;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
    }

    .modal-price {
      font-family: 'Cinzel Decorative', serif;
      font-size: 1.2rem;
      color: var(--gold);
    }

    .close-btn {
      position: absolute;
      top: 0.5rem; right: 0.5rem;
      background: rgba(0,0,0,0.75);
      border: 1px solid var(--border-hi);
      color: var(--text-dim);
      width: 26px; height: 26px;
      display: grid;
      place-items: center;
      cursor: pointer;
      font-size: 0.8rem;
      border-radius: 2px;
      z-index: 10;
      transition: color 0.15s, border-color 0.15s;
    }

    .close-btn:hover { color: var(--text-bright); border-color: var(--gold-dim); }

    .copy-btn {
      font-family: 'Cinzel', serif;
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.32rem 0.75rem;
      border-radius: 2px;
      cursor: pointer;
      border: 1px solid var(--gold-dim);
      color: var(--gold);
      background: rgba(201,162,39,0.08);
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }

    .copy-btn:hover { background: rgba(201,162,39,0.18); border-color: var(--gold); }
    .copy-btn.copied { color: #66dd77; border-color: #33aa44; background: rgba(51,170,68,0.12); }

    /* ─── Responsive ─── */
    @media (max-width: 720px) {
      .layout { grid-template-columns: 1fr; }
      aside { position: static; height: auto; border-right: none; border-bottom: 1px solid var(--border); }
      .modal { grid-template-columns: 1fr; }
      .modal-img-col img { min-height: 220px; max-height: 260px; }
    }
  </style>
</head>
<body>

<header>
  <span class="ornament">⬥ &nbsp; ⬥ &nbsp; ⬥ &nbsp; ⬥ &nbsp; ⬥ &nbsp; ⬥ &nbsp; ⬥ &nbsp; ⬥ &nbsp; ⬥</span>
  <h1>&nbsp;Gallant's Auction House&nbsp;</h1>
  <div class="subtitle">OPI Rate - 1:8t</div>
</header>

<div class="layout">

  <!-- ── Sidebar ── -->
  <aside>

    <div class="filter-block">
      <span class="filter-label">Search</span>
      <input type="text" id="q" placeholder="Search by name or description…">
    </div>

    <div class="filter-block">
      <span class="filter-label">Rarity</span>
      <div class="pill-cloud" id="rarityPanel"></div>
    </div>

    <div class="filter-block">
      <span class="filter-label">Class</span>
      <div class="pill-cloud" id="classPanel"></div>
    </div>

    <div class="filter-block">
      <span class="filter-label">Item Type</span>
      <div class="pill-cloud" id="typePanel"></div>
    </div>

    <div class="filter-block">
      <span class="filter-label">Sub Type</span>
      <div class="pill-cloud" id="subtypePanel"></div>
    </div>

    <button class="clear-all" id="clearBtn">✕ &nbsp; Clear All Filters</button>

  </aside>

  <!-- ── Main ── -->
  <main>
    <div class="toolbar">
      <span class="count" id="countEl">Loading wares…</span>
    </div>
    <div class="grid" id="grid"></div>
  </main>

</div>

<!-- ── Modal ── -->
<div class="backdrop" id="backdrop">
  <div class="modal" id="modal"></div>
</div>

<script>
  const RARITIES    = ['god','vvvvip','vvvip','vvip','vip'];
  const RARITY_RANK = {god:0, vvvvip:1, vvvip:2, vvip:3, vip:4};

  // Standard classes + Symbol-specific pseudo-classes
  const CLASSES     = ['Warrior','Mage','Thief','Archer','Pirate','WATK','MATK'];
  const CLASS_RANK  = {warrior:0, mage:1, thief:2, archer:3, pirate:4, watk:5, matk:6};

  const SUBTYPE_RANK = {
    'hat':0, 'top':1, 'pants':2, 'cape':3, 'glove':4, 'shoe':5,
    'primary':6, 'secondary':7,
    'mitras':8,
    'arcane':9, 'sacred':10, 'grand authentic':11
  };

  const ITEM_TYPES  = ['Armor','Weapon','Emblem','Symbol'];
  const TYPE_SUBS   = {
    armor:  ['Hat','Top','Pants','Cape','Glove','Shoe'],
    weapon: ['Primary','Secondary'],
    emblem: ['Mitras'],
    symbol: ['Arcane','Sacred','Grand Authentic']
  };
  // All unique subtypes flattened for the filter
  const ALL_SUBTYPES = [...new Set(Object.values(TYPE_SUBS).flat())];

  let items          = [];
  let activeRarities = new Set();   // empty = all
  let activeClasses  = new Set();   // empty = all
  let activeTypes    = new Set();   // empty = all
  let activeSubtypes = new Set();   // empty = all

  /* ── Bootstrap ── */
  fetch('items.json?v=' + Date.now())
    .then(r => { if (!r.ok) throw new Error(r.statusText); return r.json(); })
    .then(data => { items = data; buildSidebar(); render(); })
    .catch(() => {
      document.getElementById('countEl').textContent = '⚠ Could not load items.json';
    });

  /* ── Sidebar ── */
  function buildSidebar() {
    /* Rarity pills */
    const rp = document.getElementById('rarityPanel');
    RARITIES.forEach(r => {
      const el = document.createElement('span');
      el.className = `filter-pill rar-${r}`;
      el.textContent = r.toUpperCase();
      el.addEventListener('click', () => {
        const active = el.classList.toggle('on');
        active ? activeRarities.add(r) : activeRarities.delete(r);
        render();
      });
      rp.appendChild(el);
    });

    /* Class pills */
    const cp = document.getElementById('classPanel');
    CLASSES.forEach(cls => {
      const key = cls.toLowerCase();
      const el = document.createElement('span');
      el.className = `filter-pill cls-${key}`;
      el.textContent = cls;
      el.addEventListener('click', () => {
        const active = el.classList.toggle('on');
        active ? activeClasses.add(key) : activeClasses.delete(key);
        render();
      });
      cp.appendChild(el);
    });

    /* Item type pills */
    const tp = document.getElementById('typePanel');
    ITEM_TYPES.forEach(type => {
      const key = type.toLowerCase();
      const el = document.createElement('span');
      el.className = 'filter-pill';
      el.textContent = type;
      el.addEventListener('click', () => {
        const active = el.classList.toggle('on');
        active ? activeTypes.add(key) : activeTypes.delete(key);
        render();
      });
      tp.appendChild(el);
    });

    /* SubType pills */
    const sp = document.getElementById('subtypePanel');
    ALL_SUBTYPES.forEach(sub => {
      const key = sub.toLowerCase();
      const el = document.createElement('span');
      el.className = 'filter-pill';
      el.textContent = sub;
      el.addEventListener('click', () => {
        const active = el.classList.toggle('on');
        active ? activeSubtypes.add(key) : activeSubtypes.delete(key);
        render();
      });
      sp.appendChild(el);
    });

    /* Global listeners */
    document.getElementById('q').addEventListener('input', render);
    document.getElementById('clearBtn').addEventListener('click', clearAll);
    document.getElementById('backdrop').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
  }

  /* ── Filter + sort ── */
  function filtered() {
    const q = document.getElementById('q').value.trim().toLowerCase();

    return items
      .filter(it => {
        const rar = (it.rarity   || '').toLowerCase();
        const cls = (it.class    || '').toLowerCase();
        const typ = (it.itemType || '').toLowerCase();
        const sub = (it.subType  || '').toLowerCase();
        if (activeRarities.size && !activeRarities.has(rar)) return false;
        if (activeClasses.size  && !activeClasses.has(cls))  return false;
        if (activeTypes.size    && !activeTypes.has(typ))    return false;
        if (activeSubtypes.size && !activeSubtypes.has(sub)) return false;
        if (q && !it.name.toLowerCase().includes(q) && !(it.description||'').toLowerCase().includes(q)) return false;
        return true;
      })
      .sort((a, b) => {
        // Primary: rarity (god first)
        const rd = (RARITY_RANK[a.rarity]??9) - (RARITY_RANK[b.rarity]??9);
        if (rd !== 0) return rd;
        // Secondary: class order
        const cd = (CLASS_RANK[(a.class||'').toLowerCase()]??99) - (CLASS_RANK[(b.class||'').toLowerCase()]??99);
        if (cd !== 0) return cd;
        // Tertiary: subtype order
        const sd = (SUBTYPE_RANK[(a.subType||'').toLowerCase()]??99) - (SUBTYPE_RANK[(b.subType||'').toLowerCase()]??99);
        if (sd !== 0) return sd;
        // Quaternary: id
        return (a.id||0) - (b.id||0);
      });
  }

  /* ── Render grid ── */
  function render() {
    const list  = filtered();
    const grid  = document.getElementById('grid');
    const count = document.getElementById('countEl');
    count.textContent = `${list.length} item${list.length !== 1 ? 's' : ''} available`;
    grid.innerHTML = '';

    if (!list.length) {
      grid.innerHTML = `<div class="empty"><div class="empty-icon">⚗</div><div class="empty-msg">No items match your search</div></div>`;
      return;
    }

    list.forEach((it, i) => {
      const rar  = (it.rarity  || '').toLowerCase();
      const cls  = (it.class   || '').toLowerCase();
      const sub  = it.subType  || '';
      const card = document.createElement('div');
      card.className = `card ${rar}`;
      card.style.animationDelay = `${Math.min(i * 0.035, 0.4)}s`;

      const clsBadge = cls ? `<span class="badge badge-class ${cls}">${esc(it.class)}</span>` : '';
      const subBadge = sub ? `<span class="badge badge-subtype">${esc(sub)}</span>` : '';

      card.innerHTML = `
        <div class="thumb">
          <img src="${esc(it.image||`images/${it.id}.png`)}" alt="${esc(it.name)}" loading="lazy"
               onerror="this.src='https://placehold.co/300x450/110e09/261e12?text=No+Image'">
          <span class="rarity-badge ${rar}">${rar.toUpperCase()}</span>
        </div>
        <div class="card-body">
          <div class="card-name">${esc(it.name)}</div>
          <div class="card-badges">${clsBadge}${subBadge}</div>
          <div class="card-footer">
            <div class="price">${esc(it.price||'—')}</div>
          </div>
        </div>`;
      card.addEventListener('click', () => openModal(it));
      grid.appendChild(card);
    });
  }

  /* ── Modal ── */
  function openModal(it) {
    const modal = document.getElementById('modal');
    const rar   = (it.rarity || '').toLowerCase();
    const cls   = (it.class  || '').toLowerCase();
    const sub   = it.subType  || '';
    const type  = it.itemType || '';

    const clsBadge  = cls  ? `<span class="badge badge-class ${cls}">${esc(it.class)}</span>` : '';
    const typeBadge = type ? `<span class="badge badge-subtype">${esc(type)}</span>` : '';
    const subBadge  = sub  ? `<span class="badge badge-subtype">${esc(sub)}</span>` : '';

    modal.innerHTML = `
      <div class="modal-img-col">
        <img src="${esc(it.image||`images/${it.id}.png`)}" alt="${esc(it.name)}"
             onerror="this.src='https://placehold.co/300x450/110e09/261e12?text=No+Image'">
      </div>
      <div class="modal-info-col">
        <button class="close-btn" id="closeBtn">✕</button>
        <div class="modal-badges">${clsBadge}${typeBadge}${subBadge}</div>
        <div class="modal-rarity" style="color:var(--${rar})">${rar.toUpperCase()}</div>
        <div class="modal-name">${esc(it.name)}</div>
        <div class="modal-desc">${esc(it.description||'No description available.')}</div>
        <div class="modal-footer">
          <div class="modal-price">${esc(it.price||'—')}</div>
          <button class="copy-btn" id="copyBtn" title="Copy item details">Copy</button>
        </div>
      </div>`;

    document.getElementById('closeBtn').addEventListener('click', closeModal);

    document.getElementById('copyBtn').addEventListener('click', () => {
      const desc = (it.description || '').replace(/\n/g, ', ');
      const text = `${rar.toUpperCase()}\n${it.name}\n${it.price||'—'}\n${desc}`.trim();
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById('copyBtn');
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = '⎘ Copy'; btn.classList.remove('copied'); }, 2000);
      });
    });

    document.getElementById('backdrop').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    document.getElementById('backdrop').classList.remove('open');
    document.body.style.overflow = '';
  }

  /* ── Helpers ── */
  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function clearAll() {
    document.getElementById('q').value = '';
    activeRarities.clear();
    activeClasses.clear();
    activeTypes.clear();
    activeSubtypes.clear();
    document.querySelectorAll('.filter-pill').forEach(el => el.classList.remove('on'));
    render();
  }
</script>
</body>
</html>
